# AdvertWise — Local Development Services
# Usage: docker compose up -d
# Redis only. Postgres via Neon (see .env.local DATABASE_URL).

services:
  redis:
    image: redis:7-alpine
    container_name: advertwise-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
